# .github/workflows/build-apk.yml
name: Build & Send APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Svelte build ───────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build Svelte
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm run build
        # билд попадает в app/src/main/assets (как у тебя в vite.config.js)

      # ─── Android build ──────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew
        # поправь путь если gradlew лежит в другом месте

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find app -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # ─── Send to Telegram ────────────────────────────────────────
      - name: Send APK to Telegram
        run: |
          curl -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F "document=@${{ steps.find_apk.outputs.apk_path }}" \
               -F "caption=🤖 Новая сборка
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}" \
               "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument"